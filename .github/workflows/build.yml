name: Build MuMuPai

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libfuse2 libayatana-appindicator3-dev ffmpeg

      - name: Build Linux
        run: |
          cd Flutter
          flutter pub get
          flutter build linux --release

      - name: Build AppImage
        run: |
          curl -fsSL -o appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

          mkdir -p MuMuPai.AppDir/usr/bin
          mkdir -p MuMuPai.AppDir/usr/share/icons/hicolor/512x512/apps
          cp -r Flutter/build/linux/x64/release/bundle/* MuMuPai.AppDir/usr/bin/
          cp Flutter/assets/icon.png MuMuPai.AppDir/mumupai.png
          cp Flutter/assets/icon.png MuMuPai.AppDir/usr/share/icons/hicolor/512x512/apps/mumupai.png

          cat > MuMuPai.AppDir/mumupai.desktop << 'EOF'
          [Desktop Entry]
          Name=MuMuPai
          Comment=Dein Musik-Player mit Streaming! by Shinpai-AI
          Exec=mumupai
          Icon=mumupai
          Terminal=false
          Type=Application
          Categories=AudioVideo;Music;Audio;Player;
          EOF

          cat > MuMuPai.AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          export LD_LIBRARY_PATH="$HERE/usr/bin/lib:$LD_LIBRARY_PATH"

          # ffplay Check — braucht System-ffmpeg
          if ! command -v ffplay &>/dev/null; then
            zenity --error --title="MuMuPai" --width=400 \
              --text="ffplay nicht gefunden!\n\nMuMuPai braucht ffmpeg zum Abspielen.\n\nInstalliere mit:\n  Fedora/Nobara:  sudo dnf install ffmpeg\n  Ubuntu/Debian:   sudo apt install ffmpeg\n  Arch/Manjaro:    sudo pacman -S ffmpeg" 2>/dev/null \
              || echo -e "\n  MuMuPai braucht ffmpeg!\n  sudo dnf install ffmpeg\n  sudo apt install ffmpeg\n  sudo pacman -S ffmpeg\n"
            exit 1
          fi
          # $APPIMAGE = Pfad zur .AppImage Datei (wird von AppImage Runtime gesetzt)
          DEFAULT_DIR="$HOME/.local/share/mumupai"
          MARKER="$HOME/.config/mumupai/.installed"

          # === FIRST LAUNCH: Portable oder Install? ===
          if [ ! -f "$MARKER" ] && [ -n "$APPIMAGE" ]; then
            CHOICE=$(zenity --list --radiolist \
              --title="MuMuPai" \
              --text="Willkommen bei MuMuPai!\n\nWie möchtest du starten?" \
              --column="" --column="Option" --column="Beschreibung" \
              TRUE "portable" "Einfach starten (keine Installation)" \
              FALSE "install" "Installieren (Desktop-Icon + Startmenü)" \
              --width=450 --height=280 2>/dev/null)

            if [ "$CHOICE" = "install" ]; then
              # Pfad wählen
              INSTALL_DIR=$(zenity --file-selection --directory \
                --title="Installationsordner wählen (Default: $DEFAULT_DIR)" \
                --filename="$DEFAULT_DIR/" 2>/dev/null)
              [ -z "$INSTALL_DIR" ] && INSTALL_DIR="$DEFAULT_DIR"

              echo "Installiere nach: $INSTALL_DIR"
              mkdir -p "$INSTALL_DIR"
              cp "$APPIMAGE" "$INSTALL_DIR/MuMuPai.AppImage" 2>/dev/null
              chmod +x "$INSTALL_DIR/MuMuPai.AppImage"

              # Desktop Entry
              mkdir -p "$HOME/.local/share/applications"
              cat > "$HOME/.local/share/applications/mumupai.desktop" << DEOF
          [Desktop Entry]
          Name=MuMuPai
          Comment=Dein Musik-Player mit Streaming! by Shinpai-AI
          Exec=$INSTALL_DIR/MuMuPai.AppImage
          Icon=mumupai
          Terminal=false
          Type=Application
          Categories=AudioVideo;Music;Audio;Player;
          Keywords=music;player;streaming;mumupai;shinpai;
          DEOF
              chmod +x "$HOME/.local/share/applications/mumupai.desktop"

              # Icon
              ICON_DIR="$HOME/.local/share/icons/hicolor/512x512/apps"
              mkdir -p "$ICON_DIR"
              cp "$HERE/mumupai.png" "$ICON_DIR/mumupai.png" 2>/dev/null

              # CLI Launcher
              mkdir -p "$HOME/.local/bin"
              printf '#!/bin/bash\nexec "%s/MuMuPai.AppImage" "$@"\n' "$INSTALL_DIR" > "$HOME/.local/bin/mumupai"
              chmod +x "$HOME/.local/bin/mumupai"

              # Caches
              update-desktop-database "$HOME/.local/share/applications" 2>/dev/null
              gtk-update-icon-cache -f -t "$HOME/.local/share/icons/hicolor" 2>/dev/null

              # Marker
              mkdir -p "$HOME/.config/mumupai"
              printf 'installed=%s\npath=%s\n' "$(date)" "$INSTALL_DIR" > "$MARKER"

              zenity --info --text="MuMuPai installiert!\n\nOrdner: $INSTALL_DIR\nStartmenü: MuMuPai\nTerminal: mumupai\n\nStarte jetzt..." --title="MuMuPai" --width=350 2>/dev/null
            fi
          fi

          # Icon (auch portable)
          ICON_DIR="$HOME/.local/share/icons/hicolor/512x512/apps"
          mkdir -p "$ICON_DIR" 2>/dev/null
          cp "$HERE/mumupai.png" "$ICON_DIR/mumupai.png" 2>/dev/null

          exec "$HERE/usr/bin/mumupai" --disable-impeller "$@"
          APPRUN
          chmod +x MuMuPai.AppDir/AppRun

          ARCH=x86_64 ./appimagetool MuMuPai.AppDir MuMuPai-x86_64.AppImage

      - name: Upload Linux
        uses: actions/upload-artifact@v4
        with:
          name: MuMuPai-Linux
          path: MuMuPai-x86_64.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'

      - name: Build Windows
        run: |
          cd Flutter
          flutter pub get
          flutter build windows --release

      - name: Bundle ffmpeg for Windows
        run: |
          # ffmpeg Windows Binaries herunterladen (essentials = ffplay + ffprobe + ffmpeg)
          curl -fsSL -o ffmpeg.zip https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg-tmp
          $ffDir = Get-ChildItem -Path ffmpeg-tmp -Directory | Select-Object -First 1
          $binDir = Join-Path $ffDir.FullName "bin"
          $destDir = Join-Path "Flutter\build\windows\x64\runner\Release" "ffmpeg"
          New-Item -ItemType Directory -Path $destDir -Force
          Copy-Item "$binDir\ffplay.exe" $destDir
          Copy-Item "$binDir\ffprobe.exe" $destDir
        shell: pwsh

      - name: Create Install Script
        run: |
          $installScript = @'
          Add-Type -AssemblyName System.Windows.Forms
          $title = "MuMuPai Installer"
          $scriptDir = Split-Path -Parent $MyInvocation.MyCommand.Path
          $defaultDir = Join-Path $env:APPDATA "MuMuPai"

          $result = [System.Windows.Forms.MessageBox]::Show(
            "Willkommen bei MuMuPai!`n`nMoechtest du MuMuPai installieren?`n(Desktop-Verknuepfung + Startmenue)`n`nOder einfach mumupai.exe starten fuer Portable-Modus.",
            $title, "YesNo", "Question")

          if ($result -eq "Yes") {
            $folder = New-Object System.Windows.Forms.FolderBrowserDialog
            $folder.Description = "Installationsordner waehlen"
            $folder.SelectedPath = $defaultDir
            if ($folder.ShowDialog() -eq "OK") { $installDir = $folder.SelectedPath }
            else { $installDir = $defaultDir }

            Write-Host "Installiere nach: $installDir"
            New-Item -ItemType Directory -Path $installDir -Force | Out-Null
            Copy-Item "$scriptDir\*" $installDir -Recurse -Force

            # Desktop Shortcut
            $desktop = [Environment]::GetFolderPath("Desktop")
            $shell = New-Object -ComObject WScript.Shell
            $shortcut = $shell.CreateShortcut("$desktop\MuMuPai.lnk")
            $shortcut.TargetPath = "$installDir\mumupai.exe"
            $shortcut.IconLocation = "$installDir\mumupai.exe,0"
            $shortcut.WorkingDirectory = $installDir
            $shortcut.Save()

            # Start Menu
            $startMenu = Join-Path $env:APPDATA "Microsoft\Windows\Start Menu\Programs"
            $shortcut2 = $shell.CreateShortcut("$startMenu\MuMuPai.lnk")
            $shortcut2.TargetPath = "$installDir\mumupai.exe"
            $shortcut2.IconLocation = "$installDir\mumupai.exe,0"
            $shortcut2.WorkingDirectory = $installDir
            $shortcut2.Save()

            [System.Windows.Forms.MessageBox]::Show(
              "MuMuPai installiert!`n`nOrdner: $installDir`nDesktop + Startmenue Verknuepfung erstellt!`n`nStarte jetzt...",
              $title, "OK", "Information")

            Start-Process "$installDir\mumupai.exe"
          }
          '@
          Set-Content -Path "Flutter\build\windows\x64\runner\Release\Install-MuMuPai.ps1" -Value $installScript
        shell: pwsh

      - name: Package Windows
        run: |
          Compress-Archive -Path Flutter\build\windows\x64\runner\Release\* -DestinationPath MuMuPai-Windows.zip
        shell: pwsh

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: MuMuPai-Windows
          path: MuMuPai-Windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Build macOS
        run: |
          cd Flutter
          flutter pub get
          flutter build macos --release

      - name: Bundle ffmpeg into app
        run: |
          # App-Pfad finden
          APP_PATH=$(find Flutter/build/macos/Build/Products/Release -name "*.app" -maxdepth 1 | head -1)
          FFMPEG_DIR="$APP_PATH/Contents/MacOS/ffmpeg"
          mkdir -p "$FFMPEG_DIR"
          cp "$(which ffplay)" "$FFMPEG_DIR/"
          cp "$(which ffprobe)" "$FFMPEG_DIR/"
          chmod +x "$FFMPEG_DIR"/*

      - name: Package macOS
        run: |
          cd Flutter/build/macos/Build/Products/Release
          zip -r ../../../../../MuMuPai-macOS.zip *.app
          ls -la ../../../../../MuMuPai-macOS.zip

      - name: Upload macOS
        uses: actions/upload-artifact@v4
        with:
          name: MuMuPai-macOS
          path: Flutter/MuMuPai-macOS.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'

      - name: Build APK
        run: |
          cd Flutter
          flutter pub get
          flutter build apk --release

      - name: Rename APK
        run: mv Flutter/build/app/outputs/flutter-apk/app-release.apk MuMuPai.apk

      - name: Upload Android
        uses: actions/upload-artifact@v4
        with:
          name: MuMuPai-Android
          path: MuMuPai.apk

  release:
    needs: [build-linux, build-windows, build-macos, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MuMuPai-Linux/MuMuPai-x86_64.AppImage
            MuMuPai-Windows/MuMuPai-Windows.zip
            MuMuPai-macOS/MuMuPai-macOS.zip
            MuMuPai-Android/MuMuPai.apk
          body: |
            ## 🎵 MuMuPai — Dein Musik-Player mit Streaming!

            **Ein Player. Jedes Format. Überall streambar. Keine Installation nötig.**

            ### ⬇️ Downloads

            | Plattform | Datei | Anleitung |
            |-----------|-------|-----------|
            | 🐧 Linux | `MuMuPai-x86_64.AppImage` | Doppelklick! |
            | 🪟 Windows | `MuMuPai-Windows.zip` | Entpacken → mumupai.exe starten |
            | 🍎 macOS | `MuMuPai-macOS.zip` | Entpacken → MuMuPai.app starten |
            | 🤖 Android | `MuMuPai.apk` | Installieren + öffnen |

            ### ✨ Features

            - 🎵 Alle Audioformate (MP3, FLAC, WAV, OGG, AAC, M4A, WMA)
            - 📡 Streaming mit Web-UI für jeden Browser
            - 🌐 LAN + Internet Streaming
            - 💾 Playlisten speichern & laden
            - 🔊 Volume Control, Shuffle, Repeat
            - 📥 Drag & Drop
            - 🎨 Fancy UI mit Glow-Effekten
            - 📦 Alles dabei — ffplay/ffprobe eingebaut, keine Abhängigkeiten!

            ---
            *MuMuPai by [Shinpai-AI](https://shinpai.de) | AGPL-3.0*
